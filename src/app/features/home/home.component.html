<div class="home">
  <app-navbar />

  <main class="home__body">
    <div class="home__header">
      <h1 class="home__title">My Tasks</h1>
      <p class="home__subtitle">Your automation tasks, all in one place.</p>
    </div>

    <div class="home__grid" role="list" @sectionEnter>

      <!-- ── Add task card ─────────────────────────────────────────── -->
      <div class="card-slot" role="listitem">
        <button class="home__add-card" (click)="onCreateTask()" aria-label="Create new task">
          <div class="home__add-card-icon"><mat-icon>add</mat-icon></div>
          <span class="home__add-card-label">New task</span>
          <span class="home__add-card-hint">Automate anything with AI</span>
        </button>
      </div>

      <!-- ── Task cards ────────────────────────────────────────────── -->
      @for (task of tasks(); track task.id) {
        <div class="card-slot" role="listitem">
          <app-task-card
            [task]="task"
            [lastRun]="lastRunMap().get(task.id) ?? null"
            (run)="onRunTask(task.id)"
            (stop)="onStopTask(task.id)"
            (edit)="onEditTask(task.id)"
            (history)="onShowHistory(task.id)"
            (publish)="onPublish(task.id)"
            (delete)="onDeleteTask(task.id)"
          />
        </div>
      }

    </div>
  </main>

  <!-- ── Task editor modal ──────────────────────────────────────────── -->
  @if (modal().type === 'create' || modal().type === 'edit') {
    <app-task-editor-modal
      [existingTask]="editTask"
      (save)="onSaveTask($event)"
      (run)="onSaveAndRun($event)"
      (test)="onSaveAndTest($event)"
      (publish)="onSaveAndPublish($event)"
      (close)="closeModal()"
    />
  }

  <!-- ── Task history drawer ────────────────────────────────────────── -->
  @if (modal().type === 'history' && historyTaskId) {
    <app-task-history-modal
      [taskId]="historyTaskId"
      [taskTitle]="historyTaskTitle"
      (close)="closeModal()"
    />
  }

  <!-- ── Execution panel ────────────────────────────────────────────── -->
  @if (activeExecution()) {
    <app-task-execution-panel
      [taskId]="activeExecution()!.taskId"
      [runId]="activeExecution()!.runId"
      [prompt]="activeExecution()!.prompt"
      [taskName]="activeExecution()!.taskName"
      [configuration]="activeExecution()!.configuration"
      (close)="onExecutionClose()"
      (complete)="onExecutionComplete($event)"
    />
  }

  <div class="home__star" aria-hidden="true">✦</div>
</div>
