<article
  class="tkcard"
  [class.tkcard--running]="isRunning"
  [attr.aria-label]="task.title + ' — ' + task.status"
>
  <header class="tkcard__header">
    <div class="tkcard__icon" [class.tkcard__icon--active]="task.status === 'active'">
      <mat-icon aria-hidden="true">
        {{ isRunning ? 'radio_button_checked' : 'smart_toy' }}
      </mat-icon>
    </div>
    <div class="tkcard__titles">
      <h3 class="tkcard__name">{{ task.title }}</h3>
      <span class="tkcard__category" role="img" [attr.aria-label]="categoryLabel + ' category'">
        {{ categoryLabel }}
      </span>
    </div>
    <app-status-badge [status]="task.status" />
  </header>

  <div class="tkcard__body">
    <p class="tkcard__description">{{ task.description }}</p>
  </div>

  <footer class="tkcard__footer">
    @if (isRunning) {
      <button class="tkcard__btn tkcard__btn--stop" (click)="stop.emit()" aria-label="Stop task">
        <mat-icon>stop</mat-icon> Stop
      </button>
    } @else {
      <button class="tkcard__btn tkcard__btn--run" (click)="run.emit()" aria-label="Run task">
        <mat-icon>play_arrow</mat-icon> Run
      </button>
    }
    <button class="tkcard__ghost-btn" (click)="history.emit()" aria-label="View run history">
      <mat-icon>history</mat-icon> History
    </button>
    <button class="tkcard__ghost-btn" (click)="edit.emit()" aria-label="Edit task">
      <mat-icon>edit</mat-icon> Edit
    </button>
    <button class="tkcard__ghost-btn"
            [class.tkcard__ghost-btn--published]="task.isPublished"
            (click)="publish.emit()"
            [attr.aria-label]="task.isPublished ? 'Unpublish from store' : 'Publish to store'">
      <mat-icon>{{ task.isPublished ? 'cloud_done' : 'cloud_upload' }}</mat-icon>
      {{ task.isPublished ? 'Published' : 'Publish' }}
    </button>
    <button class="tkcard__ghost-btn tkcard__ghost-btn--delete" (click)="delete.emit()" aria-label="Delete task">
      <mat-icon>delete</mat-icon> Delete
    </button>
  </footer>
</article>
